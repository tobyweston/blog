name: Ghostwriter Tests

on:
  push:
    paths:
      - "ghostwriter/**"
      - ".github/workflows/ghostwriter-tests.yml"
  pull_request:
    paths:
      - "ghostwriter/**"
      - ".github/workflows/ghostwriter-tests.yml"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    defaults:
      run:
        working-directory: ghostwriter

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: ghostwriter/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        # OPENAI_API_KEY is intentionally absent — all API calls are mocked
        run: python -m pytest tests/ -v --tb=short

